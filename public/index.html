<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mubarak's Pro Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 50px; }
        .container { max-width: 600px; }
        .user-card { border-left: 5px solid #0d6efd; transition: 0.2s; }
        .user-card:hover { transform: scale(1.01); }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow-lg border-0 p-4">
        <h2 class="text-center mb-4 fw-bold">School Directory</h2>
        
        <div class="row g-2 mb-4">
            <div class="col-md-5"><input type="text" id="nameIn" class="form-control" placeholder="Full Name"></div>
            <div class="col-md-5"><input type="text" id="roleIn" class="form-control" placeholder="Role (e.g. Student)"></div>
            <div class="col-md-2"><button onclick="addUser()" class="btn btn-primary w-100">Add</button></div>
        </div>

        <div id="userList"></div>
    </div>
</div>

<script>
    async function loadUsers() {
        const res = await fetch('/api/users');
        const users = await res.json();
        const list = document.getElementById('userList');
        list.innerHTML = '';

        users.forEach(user => {
            list.innerHTML += `
                <div class="card user-card mb-2 p-3 border-0 shadow-sm bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><h6 class="mb-0 fw-bold">${user.name}</h6><small class="text-muted">${user.role}</small></div>
                        <div>
                            <button onclick="deleteUser('${user.id}')" class="btn btn-sm btn-outline-danger">Delete</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    async function addUser() {
        const name = document.getElementById('nameIn').value;
        const role = document.getElementById('roleIn').value;
        if(!name || !role) return alert("Please fill all fields");

        const res = await fetch('/api/users', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, role })
        });
        
        if(res.ok) {
            document.getElementById('nameIn').value = '';
            document.getElementById('roleIn').value = '';
            loadUsers();
        }
    }

    async function deleteUser(id) {
        const userInput = prompt("Enter Admin Password to delete:");
        const res = await fetch(`/api/users/delete/${id}?pass=${userInput}`);
        
        if (res.status === 403) {
            alert("⛔ Wrong Password!");
        } else {
            loadUsers();
        }
    }

    loadUsers();
</script>
</body>
</html>
