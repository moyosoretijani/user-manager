<div class="container">
    <div class="card shadow-lg border-0 p-4">
        <h2 class="text-center mb-4 fw-bold">User Directory</h2>
        <div class="row g-2 mb-4">
            <div class="col-md-5"><input type="text" id="nameIn" class="form-control" placeholder="Name"></div>
            <div class="col-md-5"><input type="text" id="roleIn" class="form-control" placeholder="Role"></div>
            <div class="col-md-2"><button onclick="addUser()" class="btn btn-primary w-100">Add</button></div>
        </div>
        <div id="userList"></div>
    </div>
</div>

<script>
    async function loadUsers() {
        const res = await fetch('/api/users');
        if (!res.ok) return console.error("Server is having issues");
        
        const users = await res.json();
        const list = document.getElementById('userList');
        list.innerHTML = '';

        users.forEach(user => {
            list.innerHTML += `
                <div class="card user-card mb-2 p-3 border-0 shadow-sm bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <div><h6 class="mb-0 fw-bold">${user.name}</h6><small class="text-muted">${user.role}</small></div>
                        <div>
                            <button onclick="editUser('${user.id}', '${user.name}', '${user.role}')" class="btn btn-sm btn-outline-primary">Edit</button>
                            <button onclick="deleteUser('${user.id}')" class="btn btn-sm btn-outline-danger">Delete</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    async function addUser() {
        const name = document.getElementById('nameIn').value;
        const role = document.getElementById('roleIn').value;
        if(!name || !role) return alert("Fill all fields");

        await fetch('/api/users', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, role })
        });
        
        document.getElementById('nameIn').value = '';
        document.getElementById('roleIn').value = '';
        loadUsers(); 
    }

    async function editUser(id, oldN, oldR) {
        const name = prompt("Edit Name:", oldN);
        const role = prompt("Edit Role:", oldR);
        if(!name || !role) return;

        await fetch(`/api/users/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, role })
        });
        loadUsers();
    }

    async function deleteUser(id) {
        const pass = prompt("Admin Password:");
        const res = await fetch(`/api/users/delete/${id}?pass=${pass}`);
        if(res.ok) loadUsers();
        else alert("Unauthorized");
    }

    loadUsers();
</script>
